<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sweet Demon | Music & Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0c;
            --surface: #151518;
            --surface-hover: #1f1f24;
            --primary: #8a2be2; /* Purple */
            --primary-glow: rgba(138, 43, 226, 0.4);
            --secondary: #dc143c; /* Crimson */
            --text-main: #f0f0f0;
            --text-muted: #a0a0a0;
            --glass-bg: rgba(21, 21, 24, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
            --nav-width: 240px;
            --player-height: 90px;
            --mobile-nav-height: 70px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            height: 100vh;
        }

        /* Glassmorphism utilities */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface-hover); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Navigation */
        #nav-bar {
            width: var(--nav-width);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 2rem 1rem;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            margin-bottom: 3rem;
            text-align: center;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .logo i { color: var(--secondary); }

        .nav-links { list-style: none; display: flex; flex-direction: column; gap: 1rem; }
        .nav-link {
            padding: 1rem;
            border-radius: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 600;
        }
        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .btn-upload-nav {
            margin-top: auto;
            margin-bottom: var(--player-height);
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            color: white;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.2s;
        }
        .btn-upload-nav:hover { transform: translateY(-2px); }

        /* Main Content */
        #main-content {
            margin-left: var(--nav-width);
            flex: 1;
            padding: 2rem;
            padding-bottom: calc(var(--player-height) + 2rem);
            overflow-y: auto;
            height: 100vh;
        }

        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-size: 2rem; margin-bottom: 2rem; font-weight: 700; border-bottom: 2px solid var(--surface); padding-bottom: 10px;}

        /* Grid & Cards */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .media-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 15px;
            transition: all 0.3s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .media-card:hover { transform: translateY(-5px); background: var(--surface-hover); }

        .card-cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            object-fit: cover;
            background: #2a2a30;
            margin-bottom: 15px;
            position: relative;
        }
        .video-card .card-cover { aspect-ratio: 16/9; }
        
        .play-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 0.3s;
            border-radius: 12px;
            cursor: pointer;
            font-size: 3rem; color: white;
        }
        .card-cover-container:hover .play-overlay { opacity: 1; }
        .card-cover-container { position: relative; }

        .card-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-artist { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 10px; }
        .card-genre { 
            background: var(--surface-hover); padding: 4px 8px; border-radius: 4px; 
            font-size: 0.7rem; display: inline-block; margin-bottom: 15px; color: var(--primary);
            border: 1px solid var(--primary-glow);
        }

        .card-actions {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: auto; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px;
        }

        .action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 0.9rem; transition: color 0.2s; }
        .action-btn:hover { color: white; }
        .action-btn.liked i { color: var(--secondary); }
        .action-btn.download:hover i { color: var(--primary); }

        /* Audio Player */
        #audio-player {
            position: fixed;
            bottom: 0;
            left: var(--nav-width);
            right: 0;
            height: var(--player-height);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            z-index: 200;
            justify-content: space-between;
        }

        .player-info { display: flex; align-items: center; gap: 15px; width: 30%; }
        .player-cover { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: #222; }
        .player-text { display: flex; flex-direction: column; overflow: hidden; }
        .player-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .player-artist { font-size: 0.8rem; color: var(--text-muted); }

        .player-controls-container { display: flex; flex-direction: column; align-items: center; width: 40%; gap: 10px; }
        .player-buttons { display: flex; align-items: center; gap: 20px; }
        .ctrl-btn { background: none; border: none; color: var(--text-main); font-size: 1.2rem; cursor: pointer; transition: color 0.2s; }
        .ctrl-btn:hover { color: var(--primary); }
        .ctrl-btn.active { color: var(--primary); }
        .play-pause-btn { 
            width: 40px; height: 40px; background: white; color: black; 
            border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; 
        }
        .play-pause-btn:hover { transform: scale(1.05); color: black; background: #ddd; }

        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: var(--text-muted); }
        .progress-bar { flex: 1; height: 5px; background: rgba(255,255,255,0.1); border-radius: 5px; cursor: pointer; position: relative; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 5px; width: 0%; pointer-events: none; position: relative; }
        .progress-fill::after {
            content: ''; position: absolute; right: -5px; top: -3px; width: 11px; height: 11px;
            background: white; border-radius: 50%; opacity: 0; transition: opacity 0.2s;
        }
        .progress-bar:hover .progress-fill::after { opacity: 1; }

        .player-volume { display: flex; align-items: center; gap: 10px; width: 30%; justify-content: flex-end; }
        .volume-bar { width: 100px; height: 5px; background: rgba(255,255,255,0.1); border-radius: 5px; cursor: pointer; }
        .volume-fill { height: 100%; background: white; border-radius: 5px; width: 100%; pointer-events: none; }

        /* Modals */
        .modal {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); z-index: 1000;
            justify-content: center; align-items: center; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--surface); padding: 2rem; border-radius: 16px;
            width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto;
            position: relative; border: 1px solid var(--glass-border);
        }
        .close-modal {
            position: absolute; top: 15px; right: 20px; font-size: 1.5rem;
            cursor: pointer; color: var(--text-muted);
        }
        .close-modal:hover { color: white; }

        /* Forms */
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem; }
        .form-control {
            width: 100%; padding: 12px; background: var(--bg); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: white; font-family: inherit; transition: border 0.3s;
        }
        .form-control:focus { outline: none; border-color: var(--primary); }
        .btn-submit {
            width: 100%; padding: 12px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        .btn-submit:hover { background: #7a1fd1; }

        /* Profile Specifics */
        .profile-header {
            display: flex; gap: 30px; align-items: center; margin-bottom: 3rem;
            background: var(--surface); padding: 2rem; border-radius: 16px;
        }
        .profile-avatar-container { position: relative; width: 150px; height: 150px; }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary); }
        .avatar-edit-btn {
            position: absolute; bottom: 5px; right: 5px; background: var(--surface); width: 35px; height: 35px;
            border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer;
            border: 1px solid var(--glass-border); color: white;
        }
        .profile-info h2 { font-size: 2.5rem; margin-bottom: 5px; }
        .profile-stats { display: flex; gap: 20px; margin-top: 15px; color: var(--text-muted); }
        .profile-stats span { background: var(--bg); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; }
        .social-links { display: flex; gap: 15px; margin-top: 15px; }
        .social-link { color: var(--text-muted); font-size: 1.5rem; transition: color 0.3s; }
        .social-link:hover { color: var(--primary); }
        
        /* Video Player Modal */
        #video-modal .modal-content { max-width: 900px; padding: 1rem; background: black; }
        video { width: 100%; max-height: 70vh; border-radius: 8px; outline: none; }
        .video-details { padding: 1rem; }

        /* Utilities */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .empty-state { padding: 4rem 0; color: var(--text-muted); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .empty-state i { font-size: 4rem; opacity: 0.5; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            #nav-bar {
                width: 100%; height: var(--mobile-nav-height); flex-direction: row; justify-content: space-around;
                padding: 0; bottom: 0; top: auto; border-top: 1px solid var(--glass-border);
                background: var(--surface); z-index: 300;
            }
            .logo { display: none; }
            .nav-links { flex-direction: row; width: 100%; justify-content: space-around; align-items: center; margin: 0; }
            .nav-link { padding: 10px; flex-direction: column; gap: 5px; font-size: 0.7rem; }
            .nav-link i { font-size: 1.2rem; }
            .nav-link span { display: block; }
            .btn-upload-nav { display: none; } /* Hide upload in mobile bottom nav */
            
            #main-content {
                margin-left: 0;
                padding-bottom: calc(var(--player-height) + var(--mobile-nav-height) + 1rem);
            }
            
            #audio-player {
                left: 0; bottom: var(--mobile-nav-height); height: 80px; padding: 0 10px;
                background: rgba(15,15,18,0.95);
            }
            .player-volume { display: none; }
            .player-info { width: 50%; }
            .player-controls-container { width: 50%; }
            .profile-header { flex-direction: column; text-align: center; }
        }

        /* Float action button for mobile upload */
        .mobile-upload-fab {
            display: none; position: fixed; bottom: calc(var(--player-height) + var(--mobile-nav-height) + 20px); right: 20px;
            width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white; justify-content: center; align-items: center; font-size: 1.5rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 150; cursor: pointer;
        }
        @media (max-width: 768px) { .mobile-upload-fab { display: flex; } }
    </style>
</head>
<body>

    <nav id="nav-bar" class="glass">
        <a href="#" class="logo"><i class="fa-solid fa-ghost"></i> Sweet Demon</a>
        <ul class="nav-links">
            <li class="nav-link active" onclick="app.switchTab('home')"><i class="fa-solid fa-house"></i> <span>Home</span></li>
            <li class="nav-link" onclick="app.switchTab('discover')"><i class="fa-solid fa-compass"></i> <span>Discover</span></li>
            <li class="nav-link" onclick="app.switchTab('library')"><i class="fa-solid fa-music"></i> <span>Library</span></li>
            <li class="nav-link" onclick="app.switchTab('profile')"><i class="fa-solid fa-user"></i> <span>Profile</span></li>
        </ul>
        <button class="btn-upload-nav" onclick="app.openModal('upload-modal')">
            <i class="fa-solid fa-cloud-arrow-up"></i> Upload
        </button>
    </nav>

    <div class="mobile-upload-fab" onclick="app.openModal('upload-modal')">
        <i class="fa-solid fa-plus"></i>
    </div>

    <main id="main-content">
        <section id="home-view" class="view-section active">
            <h1 class="section-title">Fresh Feed</h1>
            <div id="home-feed" class="media-grid"></div>
        </section>

        <section id="discover-view" class="view-section">
            <h1 class="section-title">Discover</h1>
            <div style="margin-bottom: 20px; display: flex; gap: 10px;">
                <button class="form-control" style="width:auto; cursor:pointer;" onclick="app.renderDiscover('all')">All</button>
                <button class="form-control" style="width:auto; cursor:pointer;" onclick="app.renderDiscover('audio')">Audio</button>
                <button class="form-control" style="width:auto; cursor:pointer;" onclick="app.renderDiscover('video')">Video</button>
            </div>
            <div id="discover-feed" class="media-grid"></div>
        </section>

        <section id="library-view" class="view-section">
            <h1 class="section-title">Your Uploads</h1>
            <div id="library-feed" class="media-grid"></div>
        </section>

        <section id="profile-view" class="view-section">
            <h1 class="section-title">Profile</h1>
            <div class="profile-header">
                <div class="profile-avatar-container">
                    <img id="profile-img-display" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='150'><rect width='150' height='150' fill='%23333'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23aaa' font-family='sans-serif' font-size='20'>Avatar</text></svg>" alt="Avatar" class="profile-avatar">
                    <div class="avatar-edit-btn" onclick="document.getElementById('avatar-upload').click()">
                        <i class="fa-solid fa-camera"></i>
                    </div>
                    <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="app.handleAvatarUpload(event)">
                </div>
                <div class="profile-info">
                    <h2 id="profile-name-display">Demon User</h2>
                    <p id="profile-bio-display" style="color: var(--text-muted); max-width: 500px;">Music enthusiast.</p>
                    <div class="profile-stats">
                        <span><i class="fa-solid fa-cloud-arrow-up"></i> <b id="stat-uploads">0</b> Uploads</span>
                        <span><i class="fa-solid fa-heart"></i> <b id="stat-likes">0</b> Likes Received</span>
                        <span><i class="fa-solid fa-play"></i> <b id="stat-plays">0</b> Total Plays/Views</span>
                    </div>
                    <div class="social-links" id="profile-socials-display"></div>
                    <button class="form-control" style="margin-top: 15px; width: auto; cursor: pointer;" onclick="app.openModal('edit-profile-modal')">Edit Profile</button>
                </div>
            </div>
        </section>
    </main>

    <div id="audio-player" class="glass">
        <audio id="core-audio-element"></audio>
        <div class="player-info">
            <img id="ap-cover" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='56'><rect width='56' height='56' fill='%23222'/></svg>" class="player-cover" alt="Cover">
            <div class="player-text">
                <span id="ap-title" class="player-title">No track selected</span>
                <span id="ap-artist" class="player-artist">-</span>
            </div>
        </div>
        <div class="player-controls-container">
            <div class="player-buttons">
                <button class="ctrl-btn" id="btn-shuffle" onclick="app.toggleShuffle()"><i class="fa-solid fa-shuffle"></i></button>
                <button class="ctrl-btn" onclick="app.playPrevious()"><i class="fa-solid fa-backward-step"></i></button>
                <button class="ctrl-btn play-pause-btn" id="btn-play-pause" onclick="app.togglePlay()"><i class="fa-solid fa-play" id="icon-play-pause"></i></button>
                <button class="ctrl-btn" onclick="app.playNext()"><i class="fa-solid fa-forward-step"></i></button>
                <button class="ctrl-btn" id="btn-repeat" onclick="app.toggleRepeat()"><i class="fa-solid fa-repeat"></i></button>
            </div>
            <div class="progress-container">
                <span id="ap-time-current">0:00</span>
                <div class="progress-bar" id="progress-bar-container" onclick="app.seekAudio(event)">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
                <span id="ap-time-total">0:00</span>
            </div>
        </div>
        <div class="player-volume">
            <i class="fa-solid fa-volume-high"></i>
            <div class="volume-bar" id="volume-bar-container" onclick="app.setVolume(event)">
                <div class="volume-fill" id="volume-fill"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="upload-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="app.closeModal('upload-modal')">&times;</span>
            <h2 style="margin-bottom: 20px;">Upload Content</h2>
            <form id="upload-form" onsubmit="app.processUpload(event)">
                <div class="form-group">
                    <label>Media File (Audio/Video)</label>
                    <input type="file" id="up-file" class="form-control" accept="audio/*,video/*" required>
                </div>
                <div class="form-group">
                    <label>Cover Art / Thumbnail</label>
                    <input type="file" id="up-cover" class="form-control" accept="image/*">
                </div>
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="up-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Artist Name</label>
                    <input type="text" id="up-artist" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Genre</label>
                    <input type="text" id="up-genre" class="form-control" placeholder="e.g. Rock, Techno">
                </div>
                <button type="submit" class="btn-submit" id="up-submit-btn">Upload</button>
            </form>
        </div>
    </div>

    <div class="modal" id="edit-profile-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="app.closeModal('edit-profile-modal')">&times;</span>
            <h2>Edit Profile</h2>
            <form id="profile-form" onsubmit="app.saveProfile(event)">
                <div class="form-group"><label>Name</label><input type="text" id="edit-name" class="form-control" required></div>
                <div class="form-group"><label>Bio</label><textarea id="edit-bio" class="form-control"></textarea></div>
                <div class="form-group"><label>Instagram</label><input type="text" id="link-ig" class="form-control"></div>
                <div class="form-group"><label>YouTube</label><input type="text" id="link-yt" class="form-control"></div>
                <button type="submit" class="btn-submit">Save</button>
            </form>
        </div>
    </div>

    <div class="modal" id="video-modal">
        <div class="modal-content" style="max-width: 800px; background: #000;">
            <span class="close-modal" onclick="app.closeVideoModal()">&times;</span>
            <video id="core-video-element" controls style="width:100%;"></video>
            <div style="padding: 20px;">
                <h2 id="vm-title"></h2>
                <p id="vm-artist" style="color:var(--text-muted)"></p>
            </div>
        </div>
    </div>

    <script>
        const app = {
            data: {
                profile: { name: "Demon User", bio: "Sweet Demon Artist", avatar: "", links: { ig: "", yt: "" } },
                media: [],
                playerState: { currentId: null, currentTime: 0, volume: 1, isShuffle: false, isRepeat: false }
            },
            audio: document.getElementById('core-audio-element'),
            video: document.getElementById('core-video-element'),
            isPlaying: false,

            init() {
                this.loadData();
                this.bindEvents();
                this.renderAll();
            },

            loadData() {
                const saved = localStorage.getItem('sweet_demon_data');
                if (saved) this.data = JSON.parse(saved);
            },

            saveData() {
                try {
                    localStorage.setItem('sweet_demon_data', JSON.stringify(this.data));
                } catch (e) { alert("Storage full! Delete some tracks."); }
            },

            switchTab(tab) {
                document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
                document.getElementById(tab + '-view').classList.add('active');
            },

            openModal(id) { document.getElementById(id).style.display = 'flex'; },
            closeModal(id) { document.getElementById(id).style.display = 'none'; },

            async fileToBase64(file) {
                return new Promise((res, rej) => {
                    const r = new FileReader();
                    r.onload = () => res(r.result);
                    r.readAsDataURL(file);
                });
            },
            async processUpload(e) {
                e.preventDefault();
                const file = document.getElementById('up-file').files[0];
                const coverFile = document.getElementById('up-cover').files[0];
                const btn = document.getElementById('up-submit-btn');
                
                btn.innerText = "Processing...";
                btn.disabled = true;

                try {
                    const mediaData = await this.fileToBase64(file);
                    const coverData = coverFile ? await this.fileToBase64(coverFile) : "";

                    const item = {
                        id: 'm' + Date.now(),
                        type: file.type,
                        title: document.getElementById('up-title').value,
                        artist: document.getElementById('up-artist').value,
                        genre: document.getElementById('up-genre').value,
                        data: mediaData,
                        cover: coverData,
                        likes: 0,
                        plays: 0
                    };

                    this.data.media.push(item);
                    this.saveData();
                    this.renderAll();
                    this.closeModal('upload-modal');
                    document.getElementById('upload-form').reset();
                } catch (err) {
                    alert("Error: File might be too large for local storage.");
                } finally {
                    btn.innerText = "Upload";
                    btn.disabled = false;
                }
            },

            renderFeed(containerId, items) {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.innerHTML = items.map(item => `
                    <div class="media-card">
                        <div class="card-cover-container" onclick="app.play('${item.id}')">
                            <img src="${item.cover || 'https://via.placeholder.com/200x200?text=No+Cover'}" class="card-cover">
                            <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
                        </div>
                        <div class="card-title">${item.title}</div>
                        <div class="card-artist">${item.artist}</div>
                        <div class="card-actions">
                            <button class="action-btn" onclick="app.like('${item.id}', event)"><i class="fa-solid fa-heart"></i> <span>${item.likes}</span></button>
                            <a href="${item.data}" download="${item.title}" class="action-btn" onclick="event.stopPropagation()"><i class="fa-solid fa-download"></i></a>
                        </div>
                    </div>
                `).join('');
            },

            renderAll() {
                this.renderFeed('home-feed', this.data.media);
                this.renderFeed('library-feed', this.data.media);
                this.renderFeed('discover-feed', this.data.media);
                this.updateProfileUI();
            },

            updateProfileUI() {
                document.getElementById('profile-name-display').innerText = this.data.profile.name;
                document.getElementById('profile-bio-display').innerText = this.data.profile.bio;
                document.getElementById('stat-uploads').innerText = this.data.media.length;
            },

            saveProfile(e) {
                e.preventDefault();
                this.data.profile.name = document.getElementById('edit-name').value;
                this.data.profile.bio = document.getElementById('edit-bio').value;
                this.saveData();
                this.updateProfileUI();
                this.closeModal('edit-profile-modal');
            },

            play(id) {
                const item = this.data.media.find(m => m.id === id);
                if (!item) return;

                if (item.type.startsWith('video')) {
                    this.audio.pause();
                    this.video.src = item.data;
                    document.getElementById('vm-title').innerText = item.title;
                    document.getElementById('vm-artist').innerText = item.artist;
                    this.openModal('video-modal');
                    this.video.play();
                } else {
                    this.audio.src = item.data;
                    document.getElementById('ap-title').innerText = item.title;
                    document.getElementById('ap-artist').innerText = item.artist;
                    document.getElementById('ap-cover').src = item.cover || '';
                    this.audio.play();
                    this.isPlaying = true;
                    this.updatePlayIcon();
                }
            },

            like(id, event) {
                event.stopPropagation();
                const item = this.data.media.find(m => m.id === id);
                if (item) {
                    item.likes++;
                    this.saveData();
                    this.renderAll();
                }
            },

            bindEvents() {
                this.audio.ontimeupdate = () => {
                    const p = (this.audio.currentTime / this.audio.duration) * 100;
                    document.getElementById('progress-fill').style.width = p + '%';
                    document.getElementById('ap-time-current').innerText = this.formatTime(this.audio.currentTime);
                    if(!isNaN(this.audio.duration)) document.getElementById('ap-time-total').innerText = this.formatTime(this.audio.duration);
                };
                this.audio.onended = () => { this.isPlaying = false; this.updatePlayIcon(); };
            },

            togglePlay() {
                if (this.audio.paused) { this.audio.play(); this.isPlaying = true; }
                else { this.audio.pause(); this.isPlaying = false; }
                this.updatePlayIcon();
            },

            updatePlayIcon() {
                const icon = document.getElementById('icon-play-pause');
                icon.className = this.isPlaying ? 'fa-solid fa-pause' : 'fa-solid fa-play';
            },

            formatTime(s) {
                const min = Math.floor(s / 60);
                const sec = Math.floor(s % 60);
                return `${min}:${sec < 10 ? '0' : ''}${sec}`;
            },

            closeVideoModal() {
                this.video.pause();
                this.closeModal('video-modal');
            }
        };

        app.init();
    </script>
</body>
</html>
